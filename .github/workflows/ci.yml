name: iOS Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
  FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
  FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 Ruby
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      # 3. 安装 Fastlane
      - name: Install Fastlane
        run: gem install fastlane

      # 4. 启动 SSH Agent 并添加 key
      - name: Setup SSH for match
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_KEY }}

      # 5. 解锁 Keychain
      - name: Unlock Keychain
        run: |
          security list-keychains -s ~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db
          security default-keychain -s ~/Library/Keychains/login.keychain-db

      # 6. 拉取证书（development）
      - name: Set up certificates
        run: fastlane match development --git_url git@github.com:cxu15757-gif/iosCITestCers.git --readonly --keychain_password "${{ secrets.KEYCHAIN_PASSWORD }}"

      # 7. 执行本地 lane
      - name: Run local lane
        run: fastlane local
