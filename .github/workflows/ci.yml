name: iOS Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
  FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
  FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 Ruby
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      # 3. 安装 Fastlane
      - name: Install Fastlane
        run: |
          gem install fastlane
          bundle install || true  # 如果没有 Gemfile 也继续

      # 4. 启动 SSH Agent 并添加 key
      - name: Setup SSH for match
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_KEY }}

      # 5. 设置系统钥匙串
      - name: Setup Keychain
        run: |
          # 使用系统默认钥匙串
          security default-keychain -s ~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          
          echo "=== 钥匙串设置完成 ==="
          security list-keychains
          security default-keychain

      # 6. 拉取证书（使用系统钥匙串，不指定 keychain_name）
      - name: Set up certificates
        run: |
          fastlane match development \
            --git_url git@github.com:cxu15757-gif/iosCITestCers.git \
            --readonly \
            --verbose
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          
      # 7. 验证证书
      - name: Verify certificates
        run: |
          echo "=== 当前钥匙串 ==="
          security list-keychains
          echo "=== 默认钥匙串 ==="
          security default-keychain
          echo "=== Available identities ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "没有描述文件"
          echo "=== Profile details ==="
          # 显示描述文件详情
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "Profile: $(basename "$profile")"
              security cms -D -i "$profile" | grep -A 1 -E "Name|UUID|TeamIdentifier|AppIDName"
              echo "---"
            fi
          done

      # 8. 执行打包 lane
      - name: Run local lane
        run: fastlane local
        env:
          # 确保环境变量传递到 Fastlane
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
